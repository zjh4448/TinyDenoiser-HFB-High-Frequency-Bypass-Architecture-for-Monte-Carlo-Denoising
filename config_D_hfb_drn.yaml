# config_D_hfb_drn.yaml - 纯 Sponza 训练 HFB+DRN (Albedo 辅助输入)
data:
  train_dir: "dataset/train/sponza"
  val_dir: "dataset/val/sponza"
  test_dir: "dataset/test"
  exr_epsilon: 0.001

model:
  type: "tiny"
  features: [32, 48, 64]
  use_hfb: true
  hfb_mode: "step1"
  use_drn_tex: true
  use_drn_edge: true

training:
  batch_size: 16
  patch_size: 128
  epochs: 60
  lr: 0.0005
  weight_decay: 0.00001
  lr_patience: 10
  lr_factor: 0.5
  min_lr: 0.00001
  grad_clip: 1.0
  gradient_accumulation: 1
  use_amp: false
  num_workers: 0
  warmup_epochs: 5
  seed: 42

loss:
  primary: "l1"
  use_channel_weight: true
  channel_weights: [1.5, 1.0, 2.5]
  use_positive_bias: true
  positive_bias_weight: 0.3
  use_multiscale: true
  multiscale_weight: 0.1
  multiscale_start_epoch: 5
  multiscale_scales: [1, 2, 4]
  multiscale_scale_weights: [1.0, 0.5, 0.25]
  use_gradient: true
  gradient_weight: 0.05
  gradient_start_epoch: 5
  use_perceptual: false
  use_drn_tex: true
  drn_tex_weight: 0.5
  drn_tex_start_epoch: 1
  use_drn_edge: true
  drn_edge_weight: 0.05
  drn_edge_start_epoch: 1

data_augmentation:
  hflip_prob: 0.5
  vflip_prob: 0.5
  rotate_90_prob: 0.3
  color_jitter: false

validation:
  val_every: 1
  save_best: true
  early_stop_patience: 25
  metrics: ["psnr", "ssim"]

output:
  checkpoint_dir: "output_n2n/sponza_hfb_drn_albedo_input/checkpoints"
  log_dir: "output_n2n/sponza_hfb_drn_albedo_input/logs"
  vis_dir: "output_n2n/sponza_hfb_drn_albedo_input/visualizations"
  save_every: 2